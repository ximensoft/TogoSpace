name: Release macOS App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-13

    env:
      TARGET_ARCH: ${{ matrix.arch }}
      # Apple 证书（用于签名）
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      # Apple 公证凭证
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

    steps:
    - uses: actions/checkout@v6
      with:
        token: ${{ secrets.GH_PAT }}
        submodules: recursive
        lfs: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-release-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-release-
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install frontend dependencies
      working-directory: frontend
      run: |
        npm ci

    - name: Import Apple certificate
      if: ${{ env.APPLE_CERTIFICATE_P12 != '' }}
      env:
        KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
      run: |
        # 创建临时 keychain
        security create-keychain -p tempkey "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p tempkey "$KEYCHAIN_PATH"

        # 导入证书
        CERT_PATH="$RUNNER_TEMP/cert.p12"
        printf '%s' "$APPLE_CERTIFICATE_P12" | base64 -D > "$CERT_PATH"

        if [ ! -s "$CERT_PATH" ]; then
          echo "❌ Certificate file is empty or decode failed"
          exit 1
        fi

        security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k tempkey "$KEYCHAIN_PATH"

        # 设为默认 keychain（codesign 无需 --keychain 参数）
        security list-keychains -d user -s "$KEYCHAIN_PATH"
        security default-keychain -s "$KEYCHAIN_PATH"

        rm "$CERT_PATH"
        echo "✅ Certificate imported"

    - name: Generate build config
      if: ${{ env.APPLE_CERTIFICATE_P12 != '' }}
      run: |
        cat > scripts/build_config.json << EOF
        {
          "apple_id": "$APPLE_ID",
          "app_specific_password": "$APPLE_APP_PASSWORD",
          "team_id": "$APPLE_TEAM_ID",
          "signing_identity_hash": "$APPLE_SIGNING_IDENTITY"
        }
        EOF

    - name: Build and release
      run: |
        if [ -f scripts/build_config.json ]; then
          python scripts/build_release.py --arch ${{ matrix.arch }}
        else
          TARGET_ARCH=${{ matrix.arch }} python scripts/build_mac.py
        fi

    - name: Get zip path
      run: |
        ZIP_PATH=$(ls dist/*.zip | head -1)
        echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        name: "TogoSpace ${{ github.ref_name }}"
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: ${{ env.ZIP_PATH }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
